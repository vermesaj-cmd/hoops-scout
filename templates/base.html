<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HoopScout{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-dribbble"></i> HoopScout
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/players"><i class="bi bi-people"></i> Players</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/players/add"><i class="bi bi-person-plus"></i> Add Player</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/compare"><i class="bi bi-arrow-left-right"></i> Compare</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-grid"></i> Browse
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/browse/state">By State</a></li>
                            <li><a class="dropdown-item" href="/browse/division">By HS Division</a></li>
                            <li><a class="dropdown-item" href="/browse/position">By Position</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-database"></i> Data
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/import"><i class="bi bi-upload"></i> Import CSV</a></li>
                            <li><a class="dropdown-item" href="/export"><i class="bi bi-download"></i> Export CSV</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" action="/players" method="get">
                    <input class="form-control me-2" type="search" name="q" placeholder="Search players..." aria-label="Search">
                    <button class="btn btn-outline-warning" type="submit"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-3 border-top mt-4">
        <small>HoopScout &mdash; Basketball Scouting & Projection Database</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
